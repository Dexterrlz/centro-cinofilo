<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambia password — Pannello Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Nunito', system-ui, sans-serif; }
    .form-input {
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      padding: 12px 16px;
      width: 100%;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      color: #1f2937;
      background: white;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .form-input:focus { outline: none; border-color: #374151; box-shadow: 0 0 0 3px rgba(55,65,81,0.1); }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

<nav class="bg-gray-900 text-white px-4 py-3 flex items-center justify-between sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <span class="font-bold text-base">🐾 Admin</span>
    <span class="text-gray-400 text-sm hidden sm:block">|</span>
    <span class="text-gray-400 text-sm hidden sm:block">{{ admin_username }}</span>
  </div>
  <a href="/admin" class="text-gray-300 hover:text-white text-xs px-3 py-1 rounded-lg hover:bg-gray-700 transition-colors">
    ← Torna al pannello
  </a>
</nav>

<div class="max-w-md mx-auto px-4 py-10">
  <h1 class="text-xl font-bold text-gray-900 mb-1">Cambia password</h1>
  <p class="text-sm text-gray-500 mb-6">Aggiorna la password del tuo account istruttore</p>

  <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">

    {% if success %}
    <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px 16px;font-size:14px;color:#166534;margin-bottom:1rem;">
      ✓ Password aggiornata con successo.
    </div>
    {% endif %}

    {% if error %}
    <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px 14px;margin-bottom:1.25rem;font-size:14px;color:#b91c1c;">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin/change-password">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-700 mb-1.5">Password attuale</label>
        <input type="password" name="current_password" autocomplete="current-password" class="form-input" required>
      </div>

      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-700 mb-1.5">Nuova password</label>
        <input type="password" name="new_password" placeholder="Minimo 8 caratteri e un numero" autocomplete="new-password" class="form-input" required>
      </div>

      <div class="mb-6">
        <label class="block text-xs font-semibold text-gray-700 mb-1.5">Conferma nuova password</label>
        <input type="password" name="confirm_password" autocomplete="new-password" class="form-input" required>
      </div>

      <button type="submit" class="w-full bg-gray-900 text-white rounded-full py-3 text-sm font-bold hover:bg-gray-700 transition-colors">
        Aggiorna password
      </button>
    </form>
  </div>
</div>
</body>
</html>
