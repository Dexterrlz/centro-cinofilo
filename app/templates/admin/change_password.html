<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8621A">
  <title>Cambia password — Pannello Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .form-input {
      border: 1.5px solid #E0E0E0;
      border-radius: 10px;
      padding: 12px 16px;
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #1C1C1E;
      background: white;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .form-input:focus { outline: none; border-color: #E8621A; box-shadow: 0 0 0 3px rgba(232,98,26,0.12); }
  </style>
</head>
<body class="bg-[#F5F5F5] text-black">

<nav class="bg-black text-white px-4 py-3 flex items-center justify-between sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <span class="font-bold text-base">🐾 Admin</span>
    <span class="text-gray-400 text-sm hidden sm:block">|</span>
    <span class="text-gray-400 text-sm hidden sm:block">{{ admin_username }}</span>
  </div>
  <a href="/admin" class="text-gray-300 hover:text-[#E8621A] text-xs px-3 py-1 rounded-lg hover:bg-white/10 transition-colors">
    ← Torna al pannello
  </a>
</nav>

<div class="max-w-md mx-auto px-4 py-10">
  <h1 class="text-xl font-bold text-black mb-1" style="font-family:'Poppins',sans-serif;">Cambia password</h1>
  <p class="text-sm text-[#666666] mb-6">Aggiorna la password del tuo account istruttore</p>

  <div class="bg-white rounded-xl border border-[#E0E0E0] p-6 shadow-sm">

    {% if success %}
    <div style="background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.35);border-radius:10px;padding:14px 16px;font-size:14px;color:#2E7D32;margin-bottom:1rem;">
      ✓ Password aggiornata con successo.
    </div>
    {% endif %}

    {% if error %}
    <div style="background:rgba(211,47,47,0.08);border:1px solid rgba(211,47,47,0.3);border-radius:10px;padding:12px 14px;margin-bottom:1.25rem;font-size:14px;color:#D32F2F;">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin/change-password">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div class="mb-4">
        <label class="block text-xs font-semibold text-[#1C1C1E] mb-1.5">Password attuale</label>
        <input type="password" name="current_password" autocomplete="current-password" class="form-input" required>
      </div>

      <div class="mb-4">
        <label class="block text-xs font-semibold text-[#1C1C1E] mb-1.5">Nuova password</label>
        <input type="password" name="new_password" placeholder="Minimo 8 caratteri e un numero" autocomplete="new-password" class="form-input" required>
      </div>

      <div class="mb-6">
        <label class="block text-xs font-semibold text-[#1C1C1E] mb-1.5">Conferma nuova password</label>
        <input type="password" name="confirm_password" autocomplete="new-password" class="form-input" required>
      </div>

      <button type="submit" class="w-full bg-[#E8621A] text-white rounded-[10px] py-3 text-sm font-semibold hover:bg-[#CC5215] transition-colors">
        Aggiorna password
      </button>
    </form>
  </div>
</div>
</body>
</html>
