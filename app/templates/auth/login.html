{% extends "base.html" %}
{% block title %}Accedi — ASD Diamoci la Zampa{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="login-page">

  <!-- Logo fuori dalla card -->
  <div class="login-logo-wrapper">
    <img src="{{ url_for('static', path='img/logo/logo-diamoci.png') }}"
         alt="ASD Diamoci la Zampa"
         class="login-logo">
  </div>

  <!-- Card form -->
  <div class="login-card">

    <div style="text-align:center;margin-bottom:1.5rem;">
      <h1 style="font-family:'Poppins',sans-serif;font-size:1.6rem;color:var(--color-choco);margin-bottom:0.35rem;font-weight:600;">
        Bentornato!
      </h1>
      <p style="color:var(--color-muted);font-size:14px;">
        Accedi per gestire le tue prenotazioni
      </p>
    </div>

    {% if error %}
    <div class="alert alert-error" style="margin-bottom:1.25rem;">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div style="margin-bottom:1rem;">
        <label for="email" class="form-label">Email</label>
        <input
          type="email" id="email" name="email"
          placeholder="mario.rossi@email.it"
          autocomplete="email"
          inputmode="email"
          autofocus
          class="form-input"
          required>
      </div>

      <div style="margin-bottom:1.5rem;">
        <label for="password" class="form-label">Password</label>
        <input
          type="password" id="password" name="password"
          placeholder="La tua password"
          autocomplete="current-password"
          class="form-input"
          required>
      </div>

      <button type="submit" class="btn-primary" style="width:100%;">
        Accedi
      </button>
    </form>

    <p style="text-align:center;font-size:14px;color:var(--color-muted);margin-top:1.5rem;margin-bottom:0;">
      Non hai un account?
      <a href="/register" style="color:var(--color-terracotta);font-weight:700;text-decoration:none;">Registrati</a>
    </p>

  </div>

</div>
{% endblock %}
